{% extends "base.html" %}
{% block title %}Login — IPL Data Analytics{% endblock %}
{% block body_class %}page-auth{% endblock %}

{% block content %}
<section class="auth-section min-vh-100 d-flex align-items-center position-relative overflow-hidden">
    <div class="auth-bg-orbs"></div>
    <div class="floating-cricket float-1 opacity-50"><i class="fa-solid fa-baseball-bat-ball"></i></div>
    <div class="floating-cricket float-2 opacity-50"><i class="fa-solid fa-trophy"></i></div>
    <div class="container position-relative z-2 py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card glass-panel reveal-up">
                    <div class="text-center mb-4">
                        <div class="auth-logo mx-auto mb-3"><i class="fa-solid fa-lock-open"></i></div>
                        <h2 class="fw-bold text-white">Welcome Back</h2>
                        <p class="text-muted small">Sign in to access the IPL analytics dashboard</p>
                    </div>
                    <!-- Flask login form — posts to /login -->
                    <form method="post" action="{{ url_for('login') }}" novalidate>
                        <div class="mb-3">
                            <label class="form-label text-light-soft" for="username">Username</label>
                            <input type="text" class="form-control form-glass" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light-soft" for="password">Password</label>
                            <input type="password" class="form-control form-glass" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label text-muted small" for="remember">Remember Me</label>
                            </div>
                            <a href="#" class="small link-accent">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn btn-glow w-100 py-2 mb-3">Login</button>
                        <p class="text-center text-muted small mb-0">
                            New here? <a href="{{ url_for('signup') }}" class="link-accent">Create an account</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
